<!DOCTYPE html>
<html>
<head>
    <title>
        log in page
    </title>
</head>
<body body text="red">
 <center>   
 <h1>LOG IN PAGE</h1>
 </center>
 <form>
    Name:<br>
    <input type="text"name="text"/><br>
    class:<br>
    <select value="dropdown">
    <option input value="CSE">CSE</option> 
    <option input value="CSM">CSM</option> 
    <option input value="CSD">CSD</option>
    <option input value="CSBS">CSBS</option>   
    </select><br>
    Email:<br>
    <input type="email" name="email" placeholder="enter your email"/><br>
    DOB:<br>
    <input type="date"/><br>
    PINCODE:<br>
    <input type="number" placeholder="50xxxx"/><br>
    ADDRESS:<br>
    <textarea rows="4"cols="30"placeholder="enter your adress"></textarea><br>
    Phone number:<br>
    <input type="tel"placeholder="1234567890"/><br>
    Password:<br>
    <input type="password"name="password"placeholder="enter password"/><br>
    <center>
        <input type="submit"/>
        <input type="reset"/>
    </center>

 </form>
</body>
</html>
